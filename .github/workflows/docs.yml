name: Publish API docs

on:
  push:
    branches: ['main']
  workflow_dispatch:

# Least privilege plus what GitHub Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; newer pushes supersede queued ones.
concurrency:
  group: pages
  cancel-in-progress: true

# The ERD generator (not run here) pulls in puppeteer, whose install would
# otherwise download a ~150MB Chromium this job never uses.
env:
  PUPPETEER_SKIP_DOWNLOAD: '1'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # The generator only needs js-yaml; skip the Prisma client generation.
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          SKIP_PRISMA_GENERATE: '1'

      # docs:api also validates the emitted spec against the OpenAPI schema and
      # fails on a malformed @openapi block, so a bad spec can't reach Pages.
      - name: Generate and validate OpenAPI docs
        run: npm run docs:api

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
