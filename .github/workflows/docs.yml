name: Publish docs

on:
  push:
    branches: ['main']
    # Only what actually changes the published site: the docusaurus sources and
    # the things the OpenAPI reference is generated from.
    paths:
      - 'docs-site/**'
      - 'src/app/api/**'
      - 'src/schemas/**'
      - 'scripts/generate-openapi.mjs'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Least privilege plus what GitHub Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; newer pushes supersede queued ones.
concurrency:
  group: pages
  cancel-in-progress: true

# The ERD generator (not run here) pulls in puppeteer, whose install would
# otherwise download a ~150MB Chromium this job never uses.
env:
  PUPPETEER_SKIP_DOWNLOAD: '1'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            docs-site/package-lock.json

      # The generator only needs js-yaml; skip the Prisma client generation.
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          SKIP_PRISMA_GENERATE: '1'

      # docs:api also validates the emitted spec against the OpenAPI schema and
      # fails on a malformed @openapi block, so a bad spec can't reach Pages.
      - name: Generate and validate the OpenAPI spec
        run: npm run docs:api

      # gen-api turns the spec into the MDX pages under /api-reference before
      # the site build picks them up.
      - name: Build the docs site
        run: |
          cd docs-site
          npm ci
          npm run gen-api
          npm run build

      # The raw spec stays at /api/openapi.json for tools that fetch it
      # directly; /api/ itself is a static redirect to the docs-site reference.
      - name: Copy the raw spec to /api/
        run: |
          mkdir -p docs-site/build/api
          cp docs-dist/openapi.json docs-site/build/api/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: docs-site/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
