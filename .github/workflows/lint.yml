name: Lint

on:
  push:
    branches: ['main']
  pull_request:

permissions:
  contents: read

jobs:
  eslint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Lint doesn't need the generated Prisma client; skipping keeps CI fast and
      # avoids the ERD generator's headless-browser toolchain.
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          SKIP_PRISMA_GENERATE: '1'

      # Hard gate: the codebase is lint-clean (0 errors, 0 warnings). `--max-warnings=0`
      # makes any new finding — warning or error — fail the job and block the merge.
      # (`npm run lint` stays warning-tolerant for local dev.)
      - name: ESLint
        run: npm run lint -- --max-warnings=0
