name: Docs check

# Runs on PRs (and main) so a broken @openapi block, an invalid spec, or stale
# generated API types are caught before merge — the publish workflow only runs
# on main, which is too late.
on:
  push:
    branches: ['main']
  pull_request:

permissions:
  contents: read

concurrency:
  group: docs-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spec-and-types:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Doc generation only needs js-yaml + the validators; skip Prisma client gen.
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          SKIP_PRISMA_GENERATE: '1'

      # `docs` validates the spec (failing on a malformed @openapi block or an
      # invalid document) and regenerates the typed client.
      - name: Generate and validate spec + types
        run: npm run docs

      - name: Ensure generated API types are committed and in sync
        run: |
          if ! git diff --quiet -- src/types/api.ts; then
            echo "::error::src/types/api.ts is out of date. Run 'npm run docs' and commit the result."
            git --no-pager diff -- src/types/api.ts
            exit 1
          fi
