name: Publish Docker image to GHCR

on:
  push:
    branches: ['main']

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-contexts: |
            context=.
          tags: |
            ghcr.io/pennstatewilkes-barre/afct-dashboard:main
            ghcr.io/pennstatewilkes-barre/afct-dashboard:sha-${{ github.sha }}

      - name: Retry build and push on failure
        id: retry
        if: steps.build.outcome == 'failure'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/pennstatewilkes-barre/afct-dashboard:main
            ghcr.io/pennstatewilkes-barre/afct-dashboard:sha-${{ github.sha }}

      - name: Fail if build did not succeed
        if: steps.build.outcome == 'failure' && steps.retry.outcome == 'failure'
        run: |
          echo "Build failed in both attempts."
          exit 1
