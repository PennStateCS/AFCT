name: Publish Docker image to GHCR

# Gated on CI: this runs only after the CI workflow finishes on main, and the
# job below bails unless CI actually passed, so a lint/test/docs failure never
# ships an image. (A direct push trigger would build in parallel with CI and
# could publish a broken commit.)
on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: ['main']

permissions:
  contents: write # allow the auto-pin step to commit docker-compose.yml back
  packages: write

# Serialize publishes: the auto-pin step commits back to main, so overlapping
# runs would race on the push. Queue rather than cancel; never kill a publish
# that may be mid-push.
concurrency:
  group: ghcr-publish
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only publish when the triggering CI run succeeded.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # Build the exact commit CI validated, not whatever main points at now.
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generates consistent tags + OCI labels (including a UTC build timestamp)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/pennstatewilkes-barre/afct-dashboard
          tags: |
            type=raw,value=main
            type=sha,format=short,prefix=sha-
            type=raw,value=build-{{date 'YYYYMMDD-HHmm' tz='UTC'}}
          labels: |
            org.opencontainers.image.title=afct-dashboard
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push (attempt 1)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push (attempt 2)
        id: retry
        if: failure()
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Print published digest
        if: always()
        run: |
          echo "Tags pushed:"
          echo "${{ steps.meta.outputs.tags }}"
          echo ""
          echo "Digest:"
          echo "${{ steps.build.outputs.digest || steps.retry.outputs.digest }}"
          echo ""
          echo "Image ID:"
          echo "${{ steps.build.outputs.imageid || steps.retry.outputs.imageid }}"

      # Scan the published image for known CVEs. Report-only for now (exit-code 0);
      # flip exit-code to '1' to make CRITICAL/HIGH block a release.
      #
      # Gate on either build attempt succeeding, not success(): a recovered retry
      # leaves the job in a "a step failed" state, which would otherwise skip this.
      #
      # continue-on-error: this is an informational scan, and its only failure mode
      # is Trivy's own binary download flaking (findings can't fail it while
      # exit-code is 0), a scanner hiccup must not block publishing the image.
      - name: Scan image for vulnerabilities (Trivy)
        if: ${{ steps.build.outcome == 'success' || steps.retry.outcome == 'success' }}
        continue-on-error: true
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          image-ref: ghcr.io/pennstatewilkes-barre/afct-dashboard@${{ steps.build.outputs.digest || steps.retry.outputs.digest }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'

      # Pin docker-compose.yml to the exact digest just published, and commit it
      # back to main. The push uses GITHUB_TOKEN, which does NOT re-trigger
      # workflows (no loop); the `[skip ci]` marker is a further safeguard.
      #
      # Race-safe: several quick pushes to main mean this run's checked-out commit
      # can be stale by the time we push, and a plain push would be rejected
      # (non-fast-forward). So each attempt re-fetches the branch tip, re-applies the
      # pin onto it, and pushes; on rejection it retries. Pinning is bookkeeping, if
      # it still loses the race after a few tries, we warn rather than fail the build
      # (the image is already published; a later run will pin it).
      - name: Auto-pin prod compose to the published digest
        if: ${{ steps.build.outcome == 'success' || steps.retry.outcome == 'success' }}
        env:
          DIGEST: ${{ steps.build.outputs.digest || steps.retry.outputs.digest }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -eu
          if [ -z "${DIGEST}" ]; then
            echo "No digest available; skipping pin."
            exit 0
          fi
          IMAGE="ghcr.io/pennstatewilkes-barre/afct-dashboard@${DIGEST}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          attempt=0
          while [ "$attempt" -lt 5 ]; do
            attempt=$((attempt + 1))
            git fetch origin "$BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
            sed -i -E \
              "s#^([[:space:]]*image:[[:space:]]*)ghcr\.io/pennstatewilkes-barre/afct-dashboard.*#\1${IMAGE}#" \
              docker-compose.yml
            if git diff --quiet -- docker-compose.yml; then
              echo "docker-compose.yml already pinned to ${DIGEST}."
              exit 0
            fi
            git add docker-compose.yml
            git commit -m "chore(release): pin prod image to ${DIGEST} [skip ci]"
            if git push origin "HEAD:$BRANCH"; then
              echo "pinned and pushed on attempt ${attempt}."
              exit 0
            fi
            echo "push rejected (branch moved); retrying (${attempt}/5)..."
            sleep 3
          done
          echo "::warning::could not pin docker-compose.yml after 5 attempts; a later publish run will pin it."

      # Sidecar images for the standalone deploy bundle (deploy/docker-compose.yml):
      # publishing nginx + backup (instead of building them on the deployer's host)
      # lets the bundle be a single compose file with no repo checkout. Placed last so
      # a sidecar-build failure can never disrupt the critical app publish + auto-pin
      # above; a failure here still surfaces (red job) without shipping a broken app.
      - name: Build and push nginx image
        if: ${{ steps.build.outcome == 'success' || steps.retry.outcome == 'success' }}
        uses: docker/build-push-action@v6
        with:
          context: docker/nginx
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/pennstatewilkes-barre/afct-nginx:main
            ghcr.io/pennstatewilkes-barre/afct-nginx:sha-${{ github.event.workflow_run.head_sha }}

      - name: Build and push backup image
        if: ${{ steps.build.outcome == 'success' || steps.retry.outcome == 'success' }}
        uses: docker/build-push-action@v6
        with:
          context: docker/backup
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/pennstatewilkes-barre/afct-backup:main
            ghcr.io/pennstatewilkes-barre/afct-backup:sha-${{ github.event.workflow_run.head_sha }}
