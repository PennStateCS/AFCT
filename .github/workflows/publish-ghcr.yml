name: Publish Docker image to GHCR

on:
  push:
    branches: ['main']

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generates consistent tags + OCI labels (including a UTC build timestamp)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/pennstatewilkes-barre/afct-dashboard
          tags: |
            type=raw,value=main
            type=sha,format=short,prefix=sha-
            type=raw,value=build-{{date 'YYYYMMDD-HHmm' tz='UTC'}}
          labels: |
            org.opencontainers.image.title=afct-dashboard
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push (attempt 1)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push (attempt 2)
        id: retry
        if: failure()
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Print published digest
        if: always()
        run: |
          echo "Tags pushed:"
          echo "${{ steps.meta.outputs.tags }}"
          echo ""
          echo "Digest:"
          echo "${{ steps.build.outputs.digest || steps.retry.outputs.digest }}"
          echo ""
          echo "Image ID:"
          echo "${{ steps.build.outputs.imageid || steps.retry.outputs.imageid }}"
