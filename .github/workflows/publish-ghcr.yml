name: Publish Docker image to GHCR

on:
  push:
    branches: ['main']

permissions:
  contents: write # allow the auto-pin step to commit docker-compose.yml back
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generates consistent tags + OCI labels (including a UTC build timestamp)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/pennstatewilkes-barre/afct-dashboard
          tags: |
            type=raw,value=main
            type=sha,format=short,prefix=sha-
            type=raw,value=build-{{date 'YYYYMMDD-HHmm' tz='UTC'}}
          labels: |
            org.opencontainers.image.title=afct-dashboard
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push (attempt 1)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push (attempt 2)
        id: retry
        if: failure()
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Print published digest
        if: always()
        run: |
          echo "Tags pushed:"
          echo "${{ steps.meta.outputs.tags }}"
          echo ""
          echo "Digest:"
          echo "${{ steps.build.outputs.digest || steps.retry.outputs.digest }}"
          echo ""
          echo "Image ID:"
          echo "${{ steps.build.outputs.imageid || steps.retry.outputs.imageid }}"

      # Scan the published image for known CVEs. Report-only for now (exit-code 0);
      # flip exit-code to '1' to make CRITICAL/HIGH block a release.
      - name: Scan image for vulnerabilities (Trivy)
        if: success()
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          image-ref: ghcr.io/pennstatewilkes-barre/afct-dashboard@${{ steps.build.outputs.digest || steps.retry.outputs.digest }}
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'

      # Pin docker-compose.yml to the exact digest just published, and commit it
      # back to main. The push uses GITHUB_TOKEN, which does NOT re-trigger
      # workflows (no loop); the `[skip ci]` marker is a further safeguard.
      - name: Auto-pin prod compose to the published digest
        if: success()
        env:
          DIGEST: ${{ steps.build.outputs.digest || steps.retry.outputs.digest }}
        run: |
          set -euo pipefail
          if [ -z "${DIGEST}" ]; then
            echo "No digest available; skipping pin."
            exit 0
          fi
          IMAGE="ghcr.io/pennstatewilkes-barre/afct-dashboard@${DIGEST}"
          sed -i -E \
            "s#^([[:space:]]*image:[[:space:]]*)ghcr\.io/pennstatewilkes-barre/afct-dashboard.*#\1${IMAGE}#" \
            docker-compose.yml
          if git diff --quiet -- docker-compose.yml; then
            echo "docker-compose.yml already pinned to ${DIGEST}."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docker-compose.yml
          git commit -m "chore(release): pin prod image to ${DIGEST} [skip ci]"
          git push origin HEAD:${{ github.ref_name }}
