name: Installer

# Release-gate tests for the self-hosted installer (deploy/install.sh). Docker is
# mocked (deploy/test/mocks), so this validates the installer's own logic — argument
# parsing, the interactive/non-interactive split, config writing, the no-secrets-in-
# the-log guarantee, and the fatal failure paths — with no daemon. Runs only when the
# deploy bundle changes.
on:
  push:
    branches: ['main']
    paths: ['deploy/**', 'docker/updater/**', 'docker/backup/**', '.github/workflows/installer.yml']
  pull_request:
    paths: ['deploy/**', 'docker/updater/**', 'docker/backup/**', '.github/workflows/installer.yml']

permissions:
  contents: read

jobs:
  installer-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install bats + shellcheck + jq
        run: sudo apt-get update && sudo apt-get install -y bats shellcheck jq

      - name: Syntax check
        run: |
          sh -n deploy/install.sh
          sh -n docker/updater/updater.sh
          sh -n docker/backup/backup.sh

      # The Windows installer has no bats-style harness; at minimum, hard-fail on
      # PowerShell syntax errors (pwsh ships on the ubuntu runners).
      - name: PowerShell installer parse check
        shell: pwsh
        run: |
          $tokens = $null; $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile("$PWD/deploy/install.ps1", [ref]$tokens, [ref]$errors) | Out-Null
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Host "PARSE ERROR: $($_.Message) (line $($_.Extent.StartLineNumber))" }
            exit 1
          }
          Write-Host 'install.ps1 parses cleanly.'

      # Advisory for now (the scripts predate shellcheck); surfaces issues without
      # blocking. Tighten to a hard gate once the existing findings are cleared.
      - name: Shellcheck (advisory)
        run: |
          shellcheck -s sh deploy/install.sh || true
          shellcheck -s sh docker/updater/updater.sh || true

      - name: Run installer + updater tests
        run: bats deploy/test/install.bats deploy/test/updater.bats
