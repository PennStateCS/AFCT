name: Installer

# Release-gate tests for the self-hosted installer (deploy/install.sh). Docker is
# mocked (deploy/test/mocks), so this validates the installer's own logic — argument
# parsing, the interactive/non-interactive split, config writing, the no-secrets-in-
# the-log guarantee, and the fatal failure paths — with no daemon. Runs only when the
# deploy bundle changes.
on:
  push:
    branches: ['main']
    paths: ['deploy/**', '.github/workflows/installer.yml']
  pull_request:
    paths: ['deploy/**', '.github/workflows/installer.yml']

permissions:
  contents: read

jobs:
  installer-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install bats + shellcheck
        run: sudo apt-get update && sudo apt-get install -y bats shellcheck

      - name: Syntax check
        run: sh -n deploy/install.sh

      # Advisory for now (the script predates shellcheck); surfaces issues without
      # blocking. Tighten to a hard gate once the existing findings are cleared.
      - name: Shellcheck (advisory)
        run: shellcheck -s sh deploy/install.sh || true

      - name: Run installer tests
        run: bats deploy/test/install.bats
