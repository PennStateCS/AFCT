name: Test

on:
  push:
    branches: ['main']
  pull_request:

permissions:
  contents: read

jobs:
  vitest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # `postinstall` generates the Prisma client (tests import enums/types from
      # @prisma/client). DISABLE_ERD skips the ERD generator's headless-browser
      # toolchain — not needed for tests. No database is required; the tests mock
      # Prisma at runtime.
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        env:
          DISABLE_ERD: 'true'

      - name: Run tests
        run: npm test
