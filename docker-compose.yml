# Production stack: the app (from the published image), an nginx TLS front, and
# Postgres. `docker compose up -d` on the host runs all three.

# Bound container log growth; the default json-file driver keeps logs forever
# and can fill the host disk. Applied to every service.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '5'

services:
  app:
    # CI pins this to the exact published digest on each push to main
    # (.github/workflows/publish-ghcr.yml), so deploys are reproducible.
    image: ghcr.io/pennstatewilkes-barre/afct-dashboard@sha256:cff87ba4148240a8c8bc8c2ea5383cc6a1a39a182dbd888f34b34db65f1ae3ba
    container_name: afct-app
    restart: unless-stopped
    logging: *default-logging

    # Cap resources so a runaway (e.g. a stuck Java evaluator) can't take down the
    # host. Sized for the shipping evaluator settings: up to 5 concurrent
    # evaluators x 256 MB (~1.3 GB of JVMs) plus the Node server. Raise the memory
    # limit if you increase evaluator memory or concurrency in System Settings, or
    # grading will be OOM-killed.
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G

    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: '5432'
      DB_USER: afct_user
      DB_NAME: afct
      WAIT_FOR_DB: 'true'
      MIGRATE_ON_START: 'true'
      SEED_ON_START: 'auto'

    depends_on:
      postgres:
        condition: service_healthy

    expose:
      - '3000'

    volumes:
      - uploads_data:/app/public/uploads
      - private_uploads:/private/uploads
      # App writes the admin TLS cert here; nginx reads it (below).
      - tls_certs:/app/certs
      # Backups: read-only for listing/downloading. The app can request a backup
      # only by dropping a flag in the separate (writable) trigger volume, so it
      # can never modify or delete actual backups.
      - db_backups:/backups:ro
      - backup_triggers:/backup-triggers

    healthcheck:
      # Lightweight endpoint (static 200 JSON, no DB work) rather than rendering
      # the full homepage on every check.
      test: ['CMD-SHELL', 'curl -fsS http://localhost:3000/api/health >/dev/null || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    # Custom image: pinned nginx + baked openssl + baked config (docker/nginx).
    build:
      context: ./docker/nginx
    container_name: afct-nginx
    restart: unless-stopped
    logging: *default-logging

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

    # Wait for the app to be healthy (not just started) so nginx doesn't serve
    # 502s while the app is still booting/migrating.
    depends_on:
      app:
        condition: service_healthy

    ports:
      - '80:80'
      - '443:443'

    volumes:
      - nginx_certs:/etc/nginx/certs
      - uploads_data:/usr/share/nginx/html/uploads
      # Admin TLS cert written by the app; nginx reads it (see entrypoint.sh).
      - tls_certs:/etc/nginx/custom-certs:ro

    healthcheck:
      # A 301 from the HTTP→HTTPS redirect means nginx is serving (curl -f only
      # fails on >=400), so this confirms liveness without needing a valid cert.
      test: ['CMD-SHELL', 'curl -fsS -o /dev/null http://localhost/ || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  postgres:
    # Digest-pinned (tag kept for readability). Bump deliberately.
    image: postgres:15-alpine@sha256:cd17e2ac98240fce1541ad2a803b34009b4eea5aec8a832363cdc7eca62e722e
    container_name: afct-postgres
    restart: unless-stopped
    logging: *default-logging

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

    # POSTGRES_PASSWORD comes from .env.production.
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: afct
      POSTGRES_USER: afct_user

    # Log slow queries (>500ms) and connection lifecycle for prod observability.
    command:
      - postgres
      - -c
      - log_min_duration_statement=500
      - -c
      - log_connections=on
      - -c
      - log_disconnections=on
      - -c
      - log_lock_waits=on

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U afct_user -d afct']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  db-backup:
    # Same Postgres image so pg_dump matches the server version exactly. Runs a
    # daily backup to the db_backups volume, a matched pair of the database dump
    # and a tarball of the upload volumes (DB rows reference files by name, so both
    # are needed for a coherent restore). The schedule (on/off, hour, retention)
    # comes from System Settings; see backup.sh. Copy the db_backups volume
    # off-host regularly: it protects against bad data/migrations, but not host loss.
    image: postgres:15-alpine@sha256:cd17e2ac98240fce1541ad2a803b34009b4eea5aec8a832363cdc7eca62e722e
    container_name: afct-db-backup
    restart: unless-stopped
    logging: *default-logging

    depends_on:
      postgres:
        condition: service_healthy

    # POSTGRES_PASSWORD comes from .env.production (backup.sh maps it to PGPASSWORD).
    env_file:
      - .env.production
    environment:
      PGHOST: postgres
      PGUSER: afct_user
      PGDATABASE: afct
      # Fallbacks used only if the settings row can't be read; the live values come
      # from System Settings (backupEnabled / backupHour / backupRetentionDays).
      BACKUP_ENABLED: 'true'
      BACKUP_HOUR: '2'
      BACKUP_RETENTION_DAYS: '14'

    entrypoint: ['/bin/sh', '/backup.sh']
    volumes:
      - ./docker/backup/backup.sh:/backup.sh:ro
      - db_backups:/backups
      # Upload volumes, read-only, snapshotted alongside the DB dump.
      - private_uploads:/snapshot/private-uploads:ro
      - uploads_data:/snapshot/public-uploads:ro
      # Watches here for the app's "back up now" flag.
      - backup_triggers:/backup-triggers

volumes:
  postgres_data:
  uploads_data:
  private_uploads:
  nginx_certs:
  tls_certs:
  db_backups:
  backup_triggers:
