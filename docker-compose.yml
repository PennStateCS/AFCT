services:
  postgres:
    image: postgres:15-alpine
    container_name: afct-postgres-prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: afct
      POSTGRES_USER: afct_user
      POSTGRES_INITDB_ARGS: "--data-checksums"
      TZ: "America/New_York"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # Different port to avoid conflicts with dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afct_user -d afct"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  app:
    container_name: afct-production
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
    # All required environment variables are sourced from .env.production
    ports:
      - "3001:3000"  # Different port to avoid conflicts with dev
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - uploads_data:/app/public/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
volumes:
  postgres_data:
  uploads_data:
