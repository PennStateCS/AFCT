services:
  postgres:
    image: postgres:15-alpine
    container_name: afct-postgres-prod
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: afct
      POSTGRES_USER: afct_user
      POSTGRES_INITDB_ARGS: "--data-checksums"
      TZ: "America/New_York"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # Different port to avoid conflicts with dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afct_user -d afct"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  prisma-studio:
    build:
      context: . # Directory containing your Dockerfile
      dockerfile: Dockerfile.dev
    ports:
      - "5555:5555" # Map Prisma Studio port
    depends_on:
      - postgres # Ensure database starts before Prisma Studio
    env_file:
      - .env.production

  app:
    container_name: afct-production
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
    # All required environment variables are sourced from .env.production
    # NOTE: no direct host port mapping — nginx will expose the app on host port 3001
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - uploads_data:/app/public/uploads
    healthcheck:
      # Healthcheck should target the app's internal port (3000)
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:1.25-alpine
    container_name: afct-nginx
    ports:
      - "3001:80"  # Public port for the app (previously mapped on app)
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    # Mount the uploads volume so nginx can serve uploaded files directly
    volumes:
      - uploads_data:/usr/share/nginx/html/uploads:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  uploads_data:
