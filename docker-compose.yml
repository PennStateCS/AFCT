services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: afct
      POSTGRES_USER: afct_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"  # Different port to avoid conflicts with dev
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afct_user -d afct"]
      interval: 10s
      timeout: 5s
      retries: 5
  app:
    container_name: afct-production
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql://afct_user:${POSTGRES_PASSWORD:-changeme123}@postgres:5432/afct
      # Override any env file values if needed
      CFGANALYZER_LIMIT: 15
      CFGANALYZER_BINARY: /app/bin/cfganalyzer
    ports:
      - "3001:3000"  # Different port to avoid conflicts with dev
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - uploads_data:/app/public/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
volumes:
  postgres_data:
  uploads_data:
