version: '3.9'

services:
  app:
    image: ghcr.io/pennstatewilkes-barre/afct-dashboard:main
    container_name: afct-app
    env_file:
      - .env.production
    # All required environment variables are sourced from .env.production
    # NOTE: no direct host port mapping — nginx will expose the app on host ports 80/443
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - uploads_data:/app/public/uploads
      # PRIVATE uploads (not served by Next.js)
      - /opt/afct/uploads:/private/uploads
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: afct_user
      DB_NAME: afct
      WAIT_FOR_DB: 'true'
      MIGRATE_ON_START: 'true'
      SEED_ON_START: 'auto'
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3000/ || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:1.25-alpine
    container_name: afct-nginx
    ports:
      - '80:80'   # HTTP
      - '443:443' # HTTPS
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - uploads_data:/usr/share/nginx/html/uploads:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs
      - ./docker/nginx/entrypoint.sh:/docker-entrypoint.d/99-self-signed.sh:ro
    healthcheck:
      disable: true

  postgres:
    image: postgres:15-alpine
    container_name: afct-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: afct
      POSTGRES_USER: afct_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - /opt/afct/postgres:/var/lib/postgresql/data

    ports:
      - '5432:5432'

    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U afct_user -d afct']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  uploads_data:
