services:
  nginx:
    image: nginx:alpine
    container_name: afct-nginx
    depends_on:
      - app
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/entrypoint.sh:/entrypoint.sh:ro
      # Persist certs (so it doesn't regenerate every restart)
      - nginx_certs:/etc/nginx/certs
      # If nginx serves /uploads via alias (matches your nginx conf)
      - uploads_data:/usr/share/nginx/html/uploads
    entrypoint: ['/bin/sh', '/entrypoint.sh']
    restart: unless-stopped

  app:
    image: ghcr.io/pennstatewilkes-barre/afct-dashboard:main
    container_name: afct-app
    env_file:
      - .env.production
    expose:
      - '3000' # only exposed to other containers, not published to host
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - uploads_data:/app/public/uploads
      # Private uploads managed by Docker (named volume)
      - private_uploads:/private/uploads
    environment:
      NODE_ENV: production
      # Leave these as container envs; Compose substitution happens from shell/.env, not env_file
      DATABASE_URL: '${DATABASE_URL}'
      DB_HOST: postgres
      DB_PORT: '5432'
      DB_USER: afct_user
      DB_NAME: afct
      WAIT_FOR_DB: 'true'
      MIGRATE_ON_START: 'true'
      SEED_ON_START: 'auto'
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:3000/ >/dev/null || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  postgres:
    image: postgres:15-alpine
    container_name: afct-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: afct
      POSTGRES_USER: afct_user
      # Same note: Compose substitution needs shell/.env, not env_file
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD}'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # In production, consider removing this so Postgres isn't exposed publicly:
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U afct_user -d afct']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  uploads_data:
  private_uploads:
  nginx_certs:
  postgres_data:
