services:
  app:
    image: ghcr.io/pennstatewilkes-barre/afct-dashboard:main
    container_name: afct-app
    restart: unless-stopped

    env_file:
      - .env.production

    depends_on:
      postgres:
        condition: service_healthy

    expose:
      - '3000'

    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: '5432'
      DB_USER: afct_user
      DB_NAME: afct
      WAIT_FOR_DB: 'true'
      MIGRATE_ON_START: 'true'
      SEED_ON_START: 'auto'

    volumes:
      - uploads_data:/app/public/uploads
      - private_uploads:/private/uploads

    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:3000/ >/dev/null || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  nginx:
    image: nginx:alpine
    container_name: afct-nginx
    restart: unless-stopped

    depends_on:
      - app

    ports:
      - '80:80'
      - '443:443'

    volumes:
      - nginx_certs:/etc/nginx/certs
      - uploads_data:/usr/share/nginx/html/uploads
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/entrypoint.sh:/entrypoint.sh:ro

    entrypoint: ['/bin/sh', '/entrypoint.sh']

  postgres:
    image: postgres:15-alpine
    container_name: afct-postgres
    restart: unless-stopped

    # Pulls POSTGRES_PASSWORD (and anything else) from .env.production
    env_file:
      - .env.production

    environment:
      POSTGRES_DB: afct
      POSTGRES_USER: afct_user

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U afct_user -d afct']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
  uploads_data:
  private_uploads:
  nginx_certs:
