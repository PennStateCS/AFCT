services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev

    container_name: afct-dev
    restart: unless-stopped

    user: '0:0'

    ports:
      - '3000:3000'

    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: 'true'
      CHOKIDAR_INTERVAL: '1000'
      WATCHPACK_POLLING: 'true'

      DATABASE_URL: postgres://afct_user:afct_pass@postgres:5432/afct

      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: afct_user
      DB_NAME: afct

      WAIT_FOR_DB: 'true'
      MIGRATE_ON_START: 'true'
      SEED_ON_START: 'true'

    depends_on:
      postgres:
        condition: service_healthy

    volumes:
      # App source (hot reload)
      - .:/app:cached

      # Keep container-installed node_modules (avoid host override)
      - afct-dev-node-modules:/app/node_modules

      # Keep .next in container to avoid slow host I/O
      - afct-dev-next:/app/.next

      # Public uploads managed by Docker (named volume)
      - afct-dev-uploads-data:/app/public/uploads

      # Private uploads managed by Docker (named volume)
      - afct-dev-private-uploads:/private/uploads

      # App-owned volume for the admin-uploaded TLS cert (nginx reads it)
      - afct-dev-tls-certs:/app/certs

    command: ['npm', 'run', 'dev']

    healthcheck:
      disable: true

  nginx:
    image: nginx:alpine
    container_name: afct-dev-nginx
    restart: unless-stopped

    ports:
      - '8080:80' # HTTP redirect
      - '8443:443' # HTTPS
    depends_on:
      app:
        condition: service_started
    volumes:
      - nginx_certs:/etc/nginx/certs
      - afct-dev-uploads-data:/usr/share/nginx/html/uploads
      - afct-dev-tls-certs:/etc/nginx/custom-certs:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ['/bin/sh', '/entrypoint.sh']
    healthcheck:
      disable: true

  postgres:
    image: postgres:15-alpine
    container_name: afct-dev-postgres

    environment:
      POSTGRES_DB: afct
      POSTGRES_USER: afct_user
      POSTGRES_PASSWORD: afct_pass

    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

    ports:
      - '5432:5432'

    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U afct_user -d afct']
      interval: 10s
      timeout: 5s
      retries: 5

  prisma-studio:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: afct-prisma-studio
    restart: unless-stopped
    ports:
      - '5555:5555'
    environment:
      DATABASE_URL: postgres://afct_user:afct_pass@postgres:5432/afct
    volumes:
      - .:/app:cached
      - afct-dev-node-modules:/app/node_modules
    command: ['npx', 'prisma', 'studio', '--browser', 'none', '--hostname', '0.0.0.0']
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  nginx_certs:
  postgres_dev_data:
  afct-dev-node-modules:
  afct-dev-next:
  afct-dev-private-uploads:
  afct-dev-uploads-data:
  afct-dev-tls-certs:
