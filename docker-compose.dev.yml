version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev

    container_name: afct-dev
    restart: unless-stopped

    ports:
      - '3000:3000'
      - '5555:5555'

    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: 'true'
      CHOKIDAR_INTERVAL: '500'
      WATCHPACK_POLLING: 'true'

      DATABASE_URL: postgres://afct_user:afct_pass@postgres:5432/afct

      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: afct_user
      DB_NAME: afct

      WAIT_FOR_DB: 'true'
      MIGRATE_ON_START: 'true'
      SEED_ON_START: 'true'

    volumes:
      # App source (hot reload)
      - .:/app

      # Keep container-installed node_modules (avoid host override)
      - /app/node_modules

      # Public uploads
      - uploads_data:/app/public/uploads

      # Private uploads managed by Docker (named volume)
      - private_uploads:/private/uploads

    depends_on:
      postgres:
        condition: service_healthy

    command: ['npm', 'run', 'dev']

    healthcheck:
      disable: true

  nginx:
    image: nginx:1.25-alpine
    container_name: afct-dev-nginx
    ports:
      - '3001:80' # HTTP redirect
      - '3002:443' # HTTPS
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/entrypoint.sh:/entrypoint.sh:ro
      - nginx_certs:/etc/nginx/certs
      - uploads_data:/usr/share/nginx/html/uploads
    healthcheck:
      disable: true

  postgres:
    image: postgres:15-alpine
    container_name: afct-dev-postgres

    environment:
      POSTGRES_DB: afct
      POSTGRES_USER: afct_user
      POSTGRES_PASSWORD: afct_pass

    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

    ports:
      - '5432:5432'

    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U afct_user -d afct']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  uploads_data:
  private_uploads:
  nginx_certs:
  postgres_dev_data:
