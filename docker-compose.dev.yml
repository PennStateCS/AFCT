version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev

    container_name: afct-dev
    restart: unless-stopped

    ports:
      - '3000:3000'
      - '5555:5555'

    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: 'true'
      CHOKIDAR_INTERVAL: '500'
      WATCHPACK_POLLING: 'true'

      DATABASE_URL: postgres://afct_user:afct_pass@postgres:5432/afct

      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: afct_user
      DB_NAME: afct

      WAIT_FOR_DB: 'true'
      MIGRATE_ON_START: 'true'
      SEED_ON_START: 'true'

    volumes:
      # App source (hot reload)
      - .:/app

      # Keep container-installed node_modules (avoid host override)
      - /app/node_modules

      # Same private uploads path as prod
      - ./dev-uploads:/private/uploads

    depends_on:
      postgres:
        condition: service_healthy

    command: ['npm', 'run', 'dev']

    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:3000/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  postgres:
    image: postgres:15-alpine
    container_name: afct-dev-postgres

    environment:
      POSTGRES_DB: afct
      POSTGRES_USER: afct_user
      POSTGRES_PASSWORD: afct_pass

    volumes:
      - afct-dev-postgres:/var/lib/postgresql/data

    ports:
      - '5432:5432'

    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U afct_user -d afct']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  afct-dev-postgres:
