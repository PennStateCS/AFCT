
services:
  postgres:
    image: postgres:15-alpine
    container_name: afct-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: afct_dev
      POSTGRES_USER: afct_user
      POSTGRES_PASSWORD: devpassword123
      POSTGRES_INITDB_ARGS: "--data-checksums"
      TZ: "America/New_York"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    command: [
      "postgres",
      "-c","shared_buffers=256MB",
      "-c","effective_cache_size=1GB",
      "-c","maintenance_work_mem=128MB",
      "-c","checkpoint_completion_target=0.9",
      "-c","wal_buffers=16MB",
      "-c","default_statistics_target=100",
      "-c","random_page_cost=1.1",
      "-c","effective_io_concurrency=200",
      "-c","work_mem=8MB",
      "-c","min_wal_size=1GB",
      "-c","max_wal_size=4GB",
      "-c","max_worker_processes=8",
      "-c","max_parallel_workers_per_gather=4",
      "-c","max_parallel_workers=8",
      "-c","max_parallel_maintenance_workers=4",
      "-c","checkpoint_timeout=30min",
      "-c","max_wal_senders=0",
      "-c","wal_level=minimal",
      "-c","archive_mode=off",
      "-c","fsync=off",
      "-c","synchronous_commit=off",
      "-c","full_page_writes=off",
      "-c","wal_compression=on",
      "-c","log_statement=none",
      "-c","log_duration=off",
      "-c","log_lock_waits=off",
      "-c","log_min_duration_statement=-1",
      "-c","autovacuum=on",
      "-c","autovacuum_max_workers=2",
      "-c","autovacuum_naptime=60s",
      "-c","shared_preload_libraries="
    ]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afct_user -d afct_dev"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    mem_limit: 1g
    tmpfs:
      - /var/run/postgresql:rw,noexec,nosuid,size=64m

  app:
    container_name: afct-dashboard
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      DATABASE_URL: postgresql://afct_user:devpassword123@postgres:5432/afct_dev
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: dev-secret-key
      AUTH_TRUST_HOST: "true"
      CFGANALYZER_LIMIT: 15
      CFGANALYZER_BINARY: /app/bin/cfganalyzer
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      MIGRATE_ON_START: "true"
      SEED_ON_START: "true"
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app:cached
      - /app/node_modules
      - ./public/uploads:/app/public/uploads:delegated
    tmpfs:
      - /app/.next:rw,uid=1000,gid=1000,size=256m
    entrypoint: ["/sbin/tini","-g","--","/usr/local/bin/entrypoint.sh"]
    command: ["npm","run","dev"]



volumes:
  postgres_dev_data:
