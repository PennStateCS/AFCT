# AFCT Dashboard: standalone production stack.
#
# This is the deploy bundle's compose file: it references only published images
# (no repo checkout, no local builds), so `install.sh` (or `docker compose up -d`)
# works with just this file plus a .env.production.
#
# Images are tracked to the `:main` tag (the latest stable build from CI). For a
# reproducible production pin, replace a tag with an @sha256:... digest from the
# GitHub Container Registry / a release.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '5'

services:
  app:
    # The deployed stack version. AFCT_APP_TAG (in .env.production) selects the image
    # tag for the whole stack — app, nginx, and backup all track it — and defaults to
    # `main` when unset. The in-app updater sets this to perform an upgrade. Postgres
    # is digest-pinned (not versioned); the updater image also tracks this tag but is
    # only swapped by a host-side `docker compose pull` (it cannot recreate itself
    # mid-upgrade).
    image: ghcr.io/pennstatecs/afct-dashboard:${AFCT_APP_TAG:-main}
    container_name: afct-app
    restart: unless-stopped
    logging: *default-logging

    # Cap resources so a runaway (e.g. a stuck Java evaluator) can't take down the
    # host. Raise the memory limit if you increase evaluator memory/concurrency in
    # System Settings, or grading will be OOM-killed.
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
          # Bounds fork bombs from a hostile submission; generous enough for Node plus
          # a JVM per concurrent evaluation and its cfganalyzer child.
          pids: 512

    # This container grades student-supplied files (the Java evaluator and the native
    # cfganalyzer run here), so it gets the tightest posture of the stack. The image
    # already runs as the non-root `node` user, listens on 3000 (no privileged port)
    # and never chowns in production, so it needs no Linux capabilities at all.
    # nginx/postgres/updater are deliberately NOT hardened this way: their entrypoints
    # start as root to bind :443, chown the data dir, or drive the Docker socket.
    cap_drop:
      - ALL
    security_opt:
      # Blocks privilege escalation through setuid binaries if the evaluator is ever
      # exploited by a malicious submission.
      - no-new-privileges:true

    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: '5432'
      DB_USER: afct_user
      DB_NAME: afct
      WAIT_FOR_DB: 'true'
      MIGRATE_ON_START: 'true'
      SEED_ON_START: 'auto'
      # Surfaces the deployed version in Admin -> System Status. Mirrors the image
      # tag selected above so the app knows which version it is running.
      IMAGE_TAG: ${AFCT_APP_TAG:-main}
      # Grading runs in the dedicated, network-isolated `worker` service below, so the app
      # must NOT also start a worker: that would double-process the queue and, worse, run
      # the evaluator on this container's internet-connected `frontend` network.
      RUN_SUBMISSION_WORKER: 'false'

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - frontend
      - backend

    expose:
      - '3000'

    volumes:
      - uploads_data:/app/public/uploads
      - private_uploads:/private/uploads
      # App writes the admin TLS cert here; nginx reads it.
      - tls_certs:/app/certs
      # ACME HTTP-01 challenge tokens; nginx serves them over HTTP (Let's Encrypt).
      - acme_challenge:/app/acme-challenge
      # Backups: read-only for listing/downloading. The app can only request a
      # backup by dropping a flag in the writable trigger volume.
      - db_backups:/backups:ro
      - backup_triggers:/backup-triggers
      # Upgrades: same request/response pattern. The app writes an upgrade request
      # here and reads status; the privileged `updater` service performs the swap.
      - update_triggers:/update-triggers

    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:3000/api/health >/dev/null || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Submission evaluator, network-isolated. Runs the SAME image as the app, but as a
  # standalone worker process (`src/worker.ts` via tsx) attached to the internal `backend`
  # network ONLY. It reaches Postgres to record grades but has NO internet egress, so a
  # hostile student submission run through the Java/cfganalyzer subprocess cannot
  # exfiltrate data or probe internal services. This is the ONLY place grading happens
  # (the app sets RUN_SUBMISSION_WORKER=false).
  worker:
    image: ghcr.io/pennstatecs/afct-dashboard:${AFCT_APP_TAG:-main}
    container_name: afct-worker
    restart: unless-stopped
    logging: *default-logging
    # Override the app's `npm start` CMD; the shared entrypoint still waits for the DB
    # first, then execs this.
    command: ['npx', 'tsx', 'src/worker.ts']

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
          # A JVM per concurrent evaluation plus its cfganalyzer child; bounds fork bombs.
          pids: 512

    # Same tight posture as the app (it grades student-supplied files) — arguably more
    # important here, since this is where the untrusted evaluator actually runs.
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: '5432'
      DB_USER: afct_user
      DB_NAME: afct
      WAIT_FOR_DB: 'true'
      # The app container owns schema migrations + seeding; the worker must not race it.
      MIGRATE_ON_START: 'false'
      SEED_ON_START: 'false'
      # The evaluator shells out to the native cfganalyzer baked into the image.
      CFGANALYZER_BINARY: /app/bin/cfganalyzer

    depends_on:
      postgres:
        condition: service_healthy

    # Internal-only network: Postgres reachable, internet NOT (no `frontend`).
    networks:
      - backend

    volumes:
      # Reads submission + answer-key files only; never writes uploads (grades -> DB),
      # so mount read-only — a compromised evaluator can't tamper with stored files.
      - private_uploads:/private/uploads:ro

  nginx:
    # Versioned in lockstep with the app (see the app service above).
    image: ghcr.io/pennstatecs/afct-nginx:${AFCT_APP_TAG:-main}
    container_name: afct-nginx
    restart: unless-stopped
    logging: *default-logging

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

    depends_on:
      app:
        condition: service_healthy

    networks:
      - frontend

    ports:
      - '80:80'
      - '443:443'

    volumes:
      - nginx_certs:/etc/nginx/certs
      - uploads_data:/usr/share/nginx/html/uploads
      # Admin TLS cert written by the app; nginx reads it.
      - tls_certs:/etc/nginx/custom-certs:ro
      # ACME HTTP-01 challenge webroot, written by the app; nginx serves it over HTTP.
      - acme_challenge:/var/www/acme-challenge:ro

    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS -o /dev/null http://localhost/ || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:15-alpine@sha256:cd17e2ac98240fce1541ad2a803b34009b4eea5aec8a832363cdc7eca62e722e
    container_name: afct-postgres
    restart: unless-stopped
    logging: *default-logging

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

    env_file:
      - .env.production
    environment:
      POSTGRES_DB: afct
      POSTGRES_USER: afct_user

    command:
      - postgres
      - -c
      - log_min_duration_statement=500
      - -c
      - log_connections=on
      - -c
      - log_disconnections=on
      - -c
      - log_lock_waits=on

    networks:
      - backend

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U afct_user -d afct']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  db-backup:
    # backup.sh is baked into this image (docker/backup/Dockerfile). Daily backup
    # to the db_backups volume: ONE archive per run holding the DB dump and the
    # upload volumes together. Schedule (on/off, hour, retention) comes from System
    # Settings. Copy the db_backups volume off-host regularly; it protects against
    # bad data/migrations, not host loss.
    #
    # Set BACKUP_ENCRYPTION_KEY in .env.production (picked up via env_file below) to
    # encrypt the archive with gpg AES-256 -- a backup is a full copy of every
    # education record. Store that passphrase OFF this server: without it the
    # backups cannot be restored. Unset means backups are written in the clear.
    # Versioned in lockstep with the app (see the app service above).
    image: ghcr.io/pennstatecs/afct-backup:${AFCT_APP_TAG:-main}
    container_name: afct-db-backup
    restart: unless-stopped
    logging: *default-logging

    depends_on:
      postgres:
        condition: service_healthy

    env_file:
      - .env.production
    environment:
      PGHOST: postgres
      PGUSER: afct_user
      PGDATABASE: afct
      # Fallbacks used only if the settings row can't be read; live values come
      # from System Settings (backupEnabled / backupHour / backupRetentionDays).
      BACKUP_ENABLED: 'true'
      BACKUP_HOUR: '2'
      BACKUP_RETENTION_DAYS: '14'

    networks:
      - backend

    volumes:
      - db_backups:/backups
      - private_uploads:/snapshot/private-uploads:ro
      - uploads_data:/snapshot/public-uploads:ro
      - backup_triggers:/backup-triggers

    # Liveness only: the scheduler stamps a heartbeat each tick. A wide 10-minute
    # window keeps a long pg_dump/pg_restore (which blocks the loop) from reading as
    # a hang. `$$` is a literal `$` for the shell (Compose would otherwise interpolate).
    healthcheck:
      test:
        - CMD-SHELL
        - test -f /tmp/afct-backup.alive && [ "$$(( $$(date +%s) - $$(cat /tmp/afct-backup.alive) ))" -lt 600 ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  updater:
    # Privileged helper that performs admin-requested app upgrades. It holds the
    # Docker socket so the app never has to: the app can only drop a request file
    # in update_triggers, which this service validates (strict tag allowlist +
    # curated release manifest) and acts on. It only ever recreates the `app`
    # service, backing up first and rolling back to the previous image on failure.
    # Tracks the stack version like the others, but an in-app upgrade never recreates
    # this service (it can't replace the container its own process runs in); the new
    # updater image is picked up by the next host-side `docker compose pull`/update.
    image: ghcr.io/pennstatecs/afct-updater:${AFCT_APP_TAG:-main}
    container_name: afct-updater
    restart: unless-stopped
    logging: *default-logging

    # Dormant until explicitly enabled: a plain `docker compose up -d` neither
    # pulls nor starts profiled services, so existing installs are unaffected and
    # this doesn't depend on the afct-updater image being published yet. Enable the
    # in-app updater with `docker compose --profile updater up -d` once the feature
    # is complete. Keeping the Docker-socket container off by default is deliberate.
    profiles: ['updater']

    environment:
      AFCT_APP_SERVICE: app
      AFCT_APP_CONTAINER: afct-app

    # Needs registry egress to pull the new image, so it sits on the external-facing
    # network. It has no reason to reach the database.
    networks:
      - frontend

    volumes:
      # The Docker socket: the whole reason this service exists. Keep it OFF the
      # app container.
      - /var/run/docker.sock:/var/run/docker.sock
      # The deploy directory (this compose file + .env.production, which the
      # updater rewrites to select the version). Mounting the directory, not the
      # single file, keeps the env rewrite atomic and visible on the host.
      - .:/afct
      - update_triggers:/update-triggers
      # Request a pre-upgrade backup and confirm it landed before swapping images.
      - backup_triggers:/backup-triggers
      - db_backups:/backups:ro

    # Liveness only: the watch loop stamps a heartbeat each poll and throughout the
    # long upgrade waits, so an in-progress upgrade stays healthy; only a hung loop
    # (or a large image pull > 3 min) trips it. `$$` is a literal `$` for the shell.
    healthcheck:
      test:
        - CMD-SHELL
        - test -f /tmp/afct-updater.alive && [ "$$(( $$(date +%s) - $$(cat /tmp/afct-updater.alive) ))" -lt 180 ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

# Two networks so the database is not reachable from -- and cannot reach -- the
# outside world:
#   frontend: normal bridge, has egress. nginx (public edge), the app (needs outbound
#             for Let's Encrypt/ACME and hCaptcha siteverify) and the updater (image
#             pulls) live here.
#   backend:  internal, no gateway and therefore no internet in either direction.
#             Postgres and the backup sidecar sit only here; the app joins it to reach
#             the DB. If the evaluator running in the app container is ever exploited,
#             Postgres is still unreachable from the internet and cannot call out.
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true

volumes:
  postgres_data:
  uploads_data:
  private_uploads:
  nginx_certs:
  tls_certs:
  acme_challenge:
  db_backups:
  backup_triggers:
  update_triggers:
