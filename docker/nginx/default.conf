# Reverse proxy for the AFCT app: terminates TLS, serves uploaded files, and
# forwards everything else to Next.js.

# Maps the WebSocket upgrade header so proxied connections can upgrade.
map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

upstream app_upstream {
  zone app_upstream 64k;
  server app:3000;
}

# Access log with timings, for correlating requests with the app's audit log.
# rt = total request time, urt = time the upstream (app) took.
log_format afct '$remote_addr - $remote_user [$time_local] "$request" '
                '$status $body_bytes_sent rt=$request_time urt=$upstream_response_time '
                '"$http_referer" "$http_user_agent"';

# Redirect all plain HTTP to HTTPS.
server {
  listen 80;
  server_name _;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  http2 on;
  server_name _;

  access_log /var/log/nginx/access.log afct;

  ssl_certificate /etc/nginx/certs/server.crt;
  ssl_certificate_key /etc/nginx/certs/server.key;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # HSTS is written here by the entrypoint, and only when a real cert is active
  # (see write_hsts). Empty on the self-signed fallback.
  include /etc/nginx/hsts.conf;

  # Baseline security response headers. `always` so they're sent on error
  # responses too. CSP is limited to frame-ancestors (clickjacking), a full
  # content policy needs app-side nonces and would risk breaking the SPA, so it's
  # intentionally left to the app. Note: nginx does not merge add_header into a
  # location that declares its own, so these are repeated in /uploads/ below.
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Content-Security-Policy "frame-ancestors 'self'" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # Allow large uploads. The app enforces the real, admin-configurable per-file
  # limit; without this nginx's 1 MB default would reject them with a 413.
  client_max_body_size 1024M;

  # Serve uploaded files straight from the shared volume.
  location /uploads/ {
    alias /usr/share/nginx/html/uploads/;
    access_log off;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    # Re-declared here because this location sets its own add_header (see note
    # above). nosniff matters most for user-uploaded content served same-origin.
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "frame-ancestors 'self'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  }

  # Everything else goes to the Next.js app.
  location / {
    proxy_pass http://app_upstream;
    proxy_redirect off;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    # Overwrite (not append) X-Forwarded-For with the real client address so a
    # client-supplied header can't spoof it; the app trusts the first entry for
    # audit logging and rate limiting, and nginx is the trusted edge here.
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Give large/slow uploads room instead of the 60s default, and stream the
    # body to the app rather than buffering the whole (up to 1 GB) request first.
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    client_body_timeout 300s;
    proxy_request_buffering off;
  }

  # Lightweight health endpoint (used by the container healthcheck).
  location = /api/health {
    proxy_pass http://app_upstream;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
  }
}
